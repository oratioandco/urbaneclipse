# Plaster Void nginx config — serve the Astro static build (HTML/JS/CSS + /cesium/ UMD
# + /berlin-core/ 3D Tiles). gzip the text assets; long-cache the immutable binaries.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback (the app is a single index.html with a client:only island).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3D Tiles must NOT fall back to index.html. Under the SPA rule a missing tile would
    # return 200 with an HTML body, and Cesium would try to parse markup as b3dm — an
    # opaque failure that looks like corrupt geometry rather than a missing file. Serve
    # a real 404 so the loader's error path can report it honestly (FR-013).
    # These directories are Docker volume mounts, so they may legitimately be absent.
    location ^~ /berlin-full/ {
        try_files $uri =404;
    }
    location ^~ /berlin-core/ {
        try_files $uri =404;
    }
    location ^~ /heightmap/ {
        try_files $uri =404;
    }

    # Cesium 3D Tiles + UMD + built chunks are content-addressed / immutable.
    location ~* \.(js|css|wasm|b3dm|glb|gltf|png|jpg|jpeg|svg|webp|ktx2|json)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # NOTE: do NOT add a bare `types {}` block here — in nginx it REPLACES the inherited
    # /etc/nginx/mime.types map, so index.html would be served as the default
    # application/octet-stream and the browser would DOWNLOAD the page instead of
    # rendering it. b3dm is served with the inherited default type (octet-stream), which
    # Cesium parses fine by magic bytes.

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/wasm application/octet-stream;
}
