# Plaster Void nginx config — serve the Astro static build (HTML/JS/CSS + /cesium/ UMD
# + /berlin-core/ 3D Tiles). gzip the text assets; long-cache the immutable binaries.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback (the app is a single index.html with a client:only island).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cesium 3D Tiles + UMD + built chunks are content-addressed / immutable.
    location ~* \.(js|css|wasm|b3dm|glb|gltf|png|jpg|jpeg|svg|webp|ktx2|json)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # b3dm has no standard MIME; serve as octet-stream (Cesium parses by magic bytes).
    types {
        application/octet-stream b3dm;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/wasm application/octet-stream;
}
